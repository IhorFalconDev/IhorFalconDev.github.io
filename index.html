<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="row">
                <div class="col-md-3">
                    <div class="logo">
                        <a href="#">
                            <img src="images/logo.png" alt="logo">
                        </a>
                    </div>
                </div>
                <div class="col-md-6">
                    <nav>
                        <ul class="menu">
                            <li><a href="#">Home</a></li>
                            <li class="productsmenu">
                                <a href="#">Products </a>
                                    <img class="arrowdownblue" src="images/chevron-down-blue.png" alt="arrowdownblue">
                                    <img class="arrowdownwhite" src="images/chevron-down-white.png" alt="arrowdownwhite">
                                        <ul class="submenu-products">
                                            <li><a href="#">Lorem ipsum dolor</a></li>
                                            <li><a href="#">Sit amet</a></li>
                                            <li><a href="#">Consectetur adipiscing</a></li>
                                            <li><a href="#">Tempor incididunt</a></li>
                                            <li><a href="#">Dolore magna aliqua</a></li>
                                            <li><a href="#">Ut enim ad minim veniam</a></li>
                                            <li><a href="#">Quis nostrud</a></li>
                                        </ul>
                                    
                                </li>
                            <li><a href="#">Payment</a></li>
                            <li><a href="#">Shipping</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="col-md-3">
                    <div class="rowsearchcart">
                        <ul class="searchcart">
                            <li class="search">
                                <form action="#" method="get">
                                    <input type="text" placeholder="search">
                                    <button>
                                        <img src="images/search.png" alt="Search">
                                    </button>
                                </form>
                            </li>
                            <li class="cart">
                                <div class="cartcount">8</div>
                                <div class="cartimg"><img src="images/cartblue.png" alt=""></div>
                            </li>
                        </ul>

                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">Main</main>
    <footer class="footer">Footer</footer>

</body>

</html>
